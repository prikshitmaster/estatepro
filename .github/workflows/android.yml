# .github/workflows/android.yml
#
# 🧠 WHAT THIS FILE DOES (plain English):
# This is the robot that builds the RatePerFeet Android app (the .apk file you
# install on a phone) up in the cloud — you do NOT need Android Studio on your
# computer.
#
# WHEN IT RUNS:
#   • Automatically whenever the app's settings/icon change on the main branch.
#   • Any time you click "Run workflow" on the GitHub → Actions tab.
#
# WHAT YOU GET:
#   When it finishes, open the run on the Actions tab and scroll to "Artifacts".
#   Download "RatePerFeet-debug-apk", unzip it, and you'll have app-debug.apk.
#   Copy that to an Android phone and tap it to install (allow "install from
#   unknown sources" the first time). The app just opens https://rateperfeet.com.

name: Build Android APK

on:
  workflow_dispatch: {} # the manual "Run workflow" button
  push:
    branches: [main]
    paths: # only rebuild when something that affects the app changes
      - "capacitor.config.ts"
      - "mobile-shell/**"
      - "assets/**"
      - "package.json"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest # GitHub's free Linux machine (has the Android SDK)
    permissions:
      contents: write # needed to publish the APK as a GitHub Release
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Create the native Android project
        run: npx cap add android

      - name: Generate app icon and splash screen
        run: npx capacitor-assets generate --android

      - name: Sync Capacitor config into the project
        run: npx cap sync android

      # ── Inject Android permissions into the manifest ──────────────────────────
      # The android/ folder is freshly generated above so we patch it here.
      # These permissions let the app ASK the user for:
      #   POST_NOTIFICATIONS  → show notifications (Android 13+)
      #   READ_CONTACTS       → import a phone contact into a lead
      #   WRITE_CONTACTS      → save a lead to contacts
      #   READ_MEDIA_IMAGES   → pick photos from gallery for property listings
      #   READ_MEDIA_VIDEO    → pick videos from gallery
      #   READ_EXTERNAL_STORAGE (≤ API 32 / Android 12) → same as above, older phones
      - name: Patch AndroidManifest.xml — permissions + OAuth deep-link
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml

          # 1. Inject permissions before </manifest>
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.READ_CONTACTS" />\n    <uses-permission android:name="android.permission.WRITE_CONTACTS" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n</manifest>|' $MANIFEST

          # 2. Add the OAuth deep-link intent-filter inside the main activity so
          #    Android routes com.rateperfeet.app://auth/callback back into the app
          #    after Google OAuth instead of opening a browser tab.
          sed -i 's|</activity>|        <intent-filter android:label="oauth_callback">\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="com.rateperfeet.app" />\n        </intent-filter>\n    </activity>|' $MANIFEST

          echo "✅ Manifest patched:"
          grep -E "uses-permission|intent-filter|scheme" $MANIFEST

      - name: Build the debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK as a workflow artifact (zipped — for desktop use)
        uses: actions/upload-artifact@v4
        with:
          name: RatePerFeet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── Publish the RAW .apk as a GitHub Release ──────────────────────────────
      # 🧠 WHY: Workflow artifacts are always downloaded as a .zip, so tapping
      # them on a phone says "file format not supported". A Release asset is the
      # raw app-debug.apk, so the download link installs directly on any phone.
      #
      # 📲 PERMANENT DOWNLOAD LINK (share this / put in apk-version.json):
      #   https://github.com/prikshitmaster/estatepro/releases/download/android-latest/app-debug.apk
      - name: Publish APK as a GitHub Release (direct install link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: RatePerFeet Android — latest
          body: |
            Latest RatePerFeet Android app.

            📲 To install: download **app-debug.apk** below, open it on your phone,
            and allow "install from unknown sources" if asked.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true

      # 🔔 REMINDER: after distributing a new APK to users, bump the version
      # in public/apk-version.json (version + download_url) and push to main.
      # The in-app update banner reads that file — installed apps will then show
      # "App update available → Update" within minutes of your push.
